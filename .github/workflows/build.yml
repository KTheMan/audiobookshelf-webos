name: Build Smart TV Packages

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate static build
        run: npx nuxt generate

      # ── webOS (LG) ──────────────────────────────────────────────────────────

      - name: Prepare webOS IPK structure
        run: |
          cp appinfo.json dist/
          cp assets/icon.png dist/assets/
          cp assets/largeIcon.png dist/assets/
          cp assets/splash.png dist/assets/

      - name: Package webOS IPK
        run: |
          VERSION=$(node -p "require('./appinfo.json').version")
          APPID=com.bigbookshelf.tv

          # An .ipk is an `ar` archive of three members, in this order:
          #   debian-binary   -> the literal string "2.0"
          #   control.tar.gz  -> the control file at the archive ROOT (./control),
          #                      NOT nested under a CONTROL/ dir (opkg/dpkg read
          #                      ./control directly — nesting it triggers
          #                      "Failed to extract control file").
          #   data.tar.gz     -> the payload under usr/palm/applications/<appid>/
          #                      so webOS registers it as an app (this is the same
          #                      layout `ares-package` produces).
          echo "2.0" > debian-binary

          mkdir -p control
          cat > control/control << EOF
          Package: $APPID
          Version: $VERSION
          Architecture: all
          Maintainer: KTheMan
          Section: multimedia
          Priority: optional
          Description: Bigbookshelf (BBS) - Audiobookshelf client for LG webOS TV
          EOF
          tar czf control.tar.gz -C control .

          mkdir -p "data/usr/palm/applications/$APPID"
          cp -a dist/. "data/usr/palm/applications/$APPID/"
          tar czf data.tar.gz -C data .

          ar rc bigbookshelf-webos.ipk debian-binary control.tar.gz data.tar.gz

      - name: Upload webOS IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-webos-ipk
          path: bigbookshelf-webos.ipk
          retention-days: 30

      # ── Tizen (Samsung) ─────────────────────────────────────────────────────

      - name: Package Tizen WGT
        run: |
          cp tizen/config.xml dist/
          cd dist && zip -r ../bigbookshelf-tizen.wgt . && cd ..

      - name: Upload Tizen WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-tizen-wgt
          path: bigbookshelf-tizen.wgt
          retention-days: 30

      # ── dist (shared) ────────────────────────────────────────────────────────

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-dist
          path: dist/
          retention-days: 30

      # ── Release ──────────────────────────────────────────────────────────────

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bigbookshelf-webos.ipk
            bigbookshelf-tizen.wgt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nav-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: bigbookshelf-dist
          path: dist/

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run D-pad navigation tests
        run: npm run test:nav
        env:
          CI: true
          # Optional env server (secrets) — the suite also audits the hardcoded
          # fallback (abs.knnygrdn.com) and skips any server it can't reach.
          ABS_SERVE: ${{ secrets.ABS_SERVE }}
          ABS_USE: ${{ secrets.ABS_USE }}
          ABS_PASS: ${{ secrets.ABS_PASS }}
          # Hardcoded test server credentials for the auth-gated route audit
          ABS_SERVER: https://abs.knnygrdn.com
          ABS_TEST_USER: webos-test
          ABS_TEST_PASS: webos-test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
